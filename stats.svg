<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6ec7"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="0" y="0" width="480" height="200" rx="16"/></clipPath>
  </defs>
  <style>
    .sans { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'Courier New', ui-monospace, Consolas, monospace; }
  </style>
  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="480" height="200" fill="#150a20"/>
    <text x="20" y="28" class="sans" font-size="14.5" font-weight="700" fill="#f5e6ff">Akash's GitHub Stats</text>

    <circle cx="84" cy="100" r="58" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
    <circle cx="84" cy="100" r="58" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="0 364.4" transform="rotate(-90 84 100)">
      <animate attributeName="stroke-dasharray" from="0 364.4" to="313.4 364.4"
                dur="1.4s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </circle>
    <text x="84" y="98" text-anchor="middle" class="mono" font-size="22" font-weight="800" fill="#f5e6ff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.5s" fill="freeze"/>
      A+
    </text>
    <text x="84" y="118" text-anchor="middle" class="sans" font-size="10" fill="#b9a6d6" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
      RANK
    </text>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.9s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="40 0;0 0" dur="0.45s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <text x="200" y="44" class="sans" font-size="12.5" fill="#b9a6d6">Total Stars</text>
      <text x="430" y="44" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#ff6ec7">38</text>
      <rect x="200" y="51" width="230" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="200" y="51" width="0" height="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="126.5" dur="1s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g><g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.08s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="40 0;0 0" dur="0.45s" begin="1.08s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <text x="200" y="78" class="sans" font-size="12.5" fill="#b9a6d6">Total Commits</text>
      <text x="430" y="78" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#ff6ec7">620+</text>
      <rect x="200" y="85" width="230" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="200" y="85" width="0" height="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="184.0" dur="1s" begin="1.1800000000000002s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g><g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.26s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="40 0;0 0" dur="0.45s" begin="1.26s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <text x="200" y="112" class="sans" font-size="12.5" fill="#b9a6d6">Total PRs</text>
      <text x="430" y="112" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#ff6ec7">24</text>
      <rect x="200" y="119" width="230" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="200" y="119" width="0" height="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="103.5" dur="1s" begin="1.36s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g><g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.44s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="40 0;0 0" dur="0.45s" begin="1.44s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      <text x="200" y="146" class="sans" font-size="12.5" fill="#b9a6d6">Repositories</text>
      <text x="430" y="146" text-anchor="end" class="mono" font-size="13" font-weight="700" fill="#ff6ec7">17</text>
      <rect x="200" y="153" width="230" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
      <rect x="200" y="153" width="0" height="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="width" from="0" to="138.0" dur="1s" begin="1.54s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
      </rect>
    </g>
  </g>
  <rect x="1" y="1" width="478" height="198" rx="15" fill="none" stroke="#c471ed" stroke-width="1.2" opacity="0.6"/>
</svg>