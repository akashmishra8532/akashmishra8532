# Generates an animated "snake" that eats through your GitHub contribution
# graph, and publishes it to the `output` branch as an SVG (both a dark-mode
# and light-mode palette so it can be swapped automatically in the README).
#
# Setup:
#   1. Save this file as .github/workflows/github-snake.yml in your
#      akashmishra8532/akashmishra8532 profile repo.
#   2. Make sure Settings → Actions → General → Workflow permissions is set
#      to "Read and write permissions" (needed to push to the output branch).
#   3. Run it once manually from the Actions tab (workflow_dispatch) to
#      generate the first output branch, then it will run daily on its own.

name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 3 * * *"   # once a day at 03:00 UTC
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: akashmishra8532
          outputs: |
            dist/github-snake-dark.svg?color_snake=%23ff6ec7&color_dots=%23150a20,%233a1256,%237b2ff7,%23c471ed,%23ff6ec7
            dist/github-snake-light.svg?color_snake=%23db2777&color_dots=%23f3e8ff,%23e9c9f2,%23c084fc,%239333ea,%23db2777

      - name: Push output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
