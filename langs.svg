      <animate attributeName="width" from="0" to="167.2" dur="1s" begin="0.30s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect><rect x="187.2" y="46" width="0" height="22" fill="#b07219">
      <animate attributeName="width" from="0" to="96.8" dur="1s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect><rect x="284.0" y="46" width="0" height="22" fill="#e34c26">
      <animate attributeName="width" from="0" to="79.2" dur="1s" begin="0.60s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect><rect x="363.2" y="46" width="0" height="22" fill="#e38c00">
      <animate attributeName="width" from="0" to="52.8" dur="1s" begin="0.75s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect><rect x="416.0" y="46" width="0" height="22" fill="#f34b7d">
      <animate attributeName="width" from="0" to="44.0" dur="1s" begin="0.90s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.10s" fill="freeze"/>
      <circle cx="25" cy="94" r="5" fill="#f1e05a"/>
      <text x="36" y="98" class="sans" font-size="12" fill="#f5e6ff">JavaScript</text>
      <text x="110.0" y="98" class="mono" font-size="11" fill="#b9a6d6">38%</text>
    </g><g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.22s" fill="freeze"/>
      <circle cx="175" cy="94" r="5" fill="#b07219"/>
      <text x="186" y="98" class="sans" font-size="12" fill="#f5e6ff">Java</text>
      <text x="220.4" y="98" class="mono" font-size="11" fill="#b9a6d6">22%</text>
    </g><g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.34s" fill="freeze"/>
      <circle cx="325" cy="94" r="5" fill="#e34c26"/>
      <text x="336" y="98" class="sans" font-size="12" fill="#f5e6ff">HTML/CSS</text>
      <text x="396.8" y="98" class="mono" font-size="11" fill="#b9a6d6">18%</text>
    </g><g opacity="0">
