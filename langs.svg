      <circle cx="175" cy="120" r="5" fill="#f34b7d"/>
      <text x="186" y="124" class="sans" font-size="12" fill="#f5e6ff">C++</text>
      <text x="213.8" y="124" class="mono" font-size="11" fill="#b9a6d6">10%</text>
    </g>
